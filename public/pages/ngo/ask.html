<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="../../../images/logo.png">
  <title>Donor Dashboard - PawSupport</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="logo">
    <img src="../../../images/logo.png">
    PawSupport
  </div>
  <div class="buttons">
    <a href="dashboard.html">Dashboard</a>
    <a href="ask.html">Ask Requests</a>
    <a href="animals.html">Add Animals</a>
    <a href="approvals.html" class="active">Approvals</a>
    <a href="profile.html">My Profile</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>
</nav>

<div class="page-wrapper">
  <div class="page-header">
    <h1>Donation Requests </h1>
    <p>Reach out to donors and tell them what your shelter needs most.</p>
  </div>
  <div class="grid">
    <div class="conatiner">
        <h2>New Request</h2>
        <form id="requestForm" class="styled-form">
          <div class="form-group">
            <label>Request Title</label>
            <input type="text" id="title" class="styled-input" placeholder="e.g. Urgent food supplies needed" required>
          </div>
          <div class="form-group">
            <label>What do you need?</label>
            <div class="type-selector">
              <div class="type-option">
                <input type="radio" name="reqType" id="typeMoney" value="money" checked>
                <label for="typeMoney"><span class="type-emoji">💰</span>Money</label>
              </div>
              <div class="type-option">
                <input type="radio" name="reqType" id="typeFood" value="food">
                <label for="typeFood"><span class="type-emoji">🥘</span>Food</label>
              </div>
              <div class="type-option">
                <input type="radio" name="reqType" id="typeItems" value="items">
                <label for="typeItems"><span class="type-emoji">📦</span>Items</label>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label>Quantity</label>
            <input type="number" id="quantity" class="styled-input" placeholder="e.g. 50" min="1" required>
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea id="desc" class="styled-textarea" placeholder="Explain what you need and why it matters…" required></textarea>
          </div>
          <button type="submit" class="btn-primary">Submit Request</button>
        </form>
    </div>
      <div class="my-requests-section">
      <div class="section-divider"></div>
      <div id="myRequests">
        <div class="empty-state">
          <div class="empty-icon"></div><p>Loading your requests…</p>
        </div>
      </div>
      </div>
    </div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
